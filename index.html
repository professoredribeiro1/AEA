
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amor em Ação - Seu relacionamento blindado dia a dia</title>
    <!-- v1.0.1 - Force fresh deploy -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    <style>
      :root {
        --rose-light: #fff1f2;
        --rose-primary: #f43f5e;
        --rose-dark: #881337;
      }

      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: linear-gradient(135deg, #fff1f2 0%, #fff 50%, #fdf2f8 100%);
        background-attachment: fixed;
      }
      
      h1, h2, h3 { font-family: 'Playfair Display', serif; }
      
      /* Efeito de Ondas para o Tanque Líquido (Tema Moderno) */
      @keyframes wave {
        0% { transform: translateX(-50%) skewY(-2deg); }
        50% { transform: translateX(-50%) skewY(2deg); }
        100% { transform: translateX(-50%) skewY(-2deg); }
      }

      .liquid-wave {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 200%;
        height: 100%;
        background: rgba(244, 63, 94, 0.4);
        border-radius: 38%;
        animation: wave 10s infinite linear;
        transform: translateX(-50%);
      }

      .liquid-wave:nth-child(2) {
        bottom: 5px;
        background: rgba(244, 63, 94, 0.8);
        animation-duration: 7s;
        border-radius: 40%;
      }

      /* Estilo Aquarela (Suave e Desfocado) */
      .watercolor-wave {
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 150%;
        height: 120%;
        background: radial-gradient(circle, rgba(244, 63, 94, 0.6) 0%, transparent 70%);
        filter: blur(30px);
        animation: wave 15s infinite ease-in-out;
        transform: translateX(-50%);
      }

      /* Celebração de Corações */
      @keyframes floatUp {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 0.8; }
        100% { transform: translateY(-300px) scale(1.5) rotate(20deg); opacity: 0; }
      }

      .floating-heart {
        position: fixed;
        pointer-events: none;
        z-index: 100;
        animation: floatUp 3s ease-out forwards;
      }

      /* Glassmorphism */
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 8px 32px 0 rgba(244, 63, 94, 0.05);
      }

      /* Hover states premium */
      .hover-lift {
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hover-lift:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(244, 63, 94, 0.1);
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 10px; }
    </style>
  </head>
  <body class="min-h-screen text-slate-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
